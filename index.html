<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Nish Design | Çok Yakında</title>
    <style>
        body {
            background-color: #111;
            color: #d8a086; /* Logodaki rose-gold tonu */
            font-family: 'Helvetica Neue', Arial, sans-serif;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;

    <img src="logo.png" alt="Nish Design" class="logo-placeholder">
